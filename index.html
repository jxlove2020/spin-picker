<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>뽑기판</title>
  <link rel="stylesheet" href="picker.css" />
</head>
<body>

<header>
  <div class="logo" id="logo">🎡</div>
  <h1 id="titleMain">Spin Picker <span id="titleSub">뽑기판</span></h1>
  <div class="header-spacer"></div>
  <div class="version-toggle">
    <span class="ver-btn active" id="verSpin" role="button" tabindex="0">🎡 <span class="ver-label">Spin</span></span>
    <span class="ver-btn" id="verPinball" role="button" tabindex="0">🎪 <span class="ver-label">Pinball</span></span>
  </div>
  <div class="settings-menu-wrap">
    <button class="btn-settings" id="btnSettings" title="설정">⚙️</button>
    <div class="settings-dropdown" id="settingsDropdown">
      <button class="dropdown-item" id="menuClearCache">🗑️ 캐시 비우기</button>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" id="menuReset">↺ 전체 초기화</button>
    </div>
  </div>
</header>

<div class="app">
  <section class="game-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
      <div class="spin-pointer" id="spinPointer"></div>
    </div>
    <button class="btn-action" id="btnAction">▶ 돌리기!</button>
    <div class="result-box" id="resultBox">
      <div class="result-label" id="resultLabel"></div>
      <div class="result-value" id="resultValue"></div>
    </div>
  </section>

  <div class="settings-section" id="settingsSection">
    <div class="sheet-handle-bar" id="sheetHandleBar">
      <div class="handle-pill"></div>
      <div class="sheet-title-row">
        <span class="sheet-title">⚙️ 뽑기 설정</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sheet-arrow">▾</span>
          <button class="btn-close-sheet" id="btnCloseSheet">✕</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="section-label">📋 예제 불러오기</div>
      <div class="preset-row">
        <select class="preset-select" id="presetSelect">
          <option value="">-- 예제 선택 --</option>
          <option value="church_food">🍽️ 교회근처 식당</option>
        </select>
        <button class="btn-load-preset" id="btnLoadPreset">불러오기</button>
      </div>
      <div class="map-section">
        <div class="section-label">🗺️ 보드 맵</div>
        <div class="map-toggle">
          <button class="map-btn active" data-map="classic">🎯 클래식</button>
          <button class="map-btn" data-map="random">🎲 랜덤</button>
          <button class="map-btn" data-map="bumper">💥 범퍼</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="section-label" id="lblSlotSection">칸 수 설정</div>
      <div class="count-row">
        <label id="lblSlotCount">칸 수</label>
        <input type="number" id="slotCount" min="2" max="20" value="6" inputmode="numeric" />
        <button class="btn-apply" id="btnApply">변경</button>
      </div>
      <div class="section-label" id="lblItemsSection">항목 입력</div>
      <div class="slots-list" id="slotsList"></div>
      <div class="panel-actions">
        <button class="btn-save" id="btnSave">✅ 적용</button>
        <button class="btn-reset" id="btnReset">초기화</button>
      </div>
      <div class="save-msg" id="saveMsg"></div>
    </div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>

<script src="picker.js"></script>
</body>
</html>
